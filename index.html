<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR. MOHIT | AIIMS DELHI PORTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; scroll-behavior: smooth; color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        
        @keyframes sparkle {
            0% { border-color: #ffd700; box-shadow: 0 0 5px #ffd700; }
            50% { border-color: #ffffff; box-shadow: 0 0 20px #ffaa00; }
            100% { border-color: #ffd700; box-shadow: 0 0 5px #ffd700; }
        }
        .today-sparkle {
            animation: sparkle 1.5s infinite;
            border: 2px solid #ffd700 !important;
            background: rgba(255, 215, 0, 0.1) !important;
            color: #fff !important;
            font-weight: 900 !important;
        }
        .selected-date { border: 2px solid #3b82f6 !important; background: rgba(59, 130, 246, 0.2); }
        .mode-transition { transition: all 0.3s ease; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

        .road-path {
            height: 48px;
            background: linear-gradient(90deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 3px dashed rgba(255, 255, 255, 0.1);
            position: relative;
            border-radius: 12px;
            margin-top: 40px;
        }
        .avatar-mohit {
            position: absolute;
            bottom: 8px;
            width: 50px;
            height: 50px;
            transition: left 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 20;
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5));
            border-radius: 50%;
            object-fit: cover;
        }
        .aiims-dest {
            position: absolute;
            right: -15px;
            top: -35px;
            width: 85px;
            height: 85px;
            z-index: 10;
            filter: drop-shadow(0 0 15px rgba(234, 179, 8, 0.3));
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-10 px-4">

    <div class="max-w-6xl mx-auto pt-6">
        <div class="glass rounded-3xl p-6 flex flex-wrap items-center justify-between border-l-4 border-yellow-500 relative overflow-hidden mb-6">
            <div class="absolute top-0 right-0 p-4 opacity-5 text-7xl italic font-black">AIIMS</div>
            <div class="flex items-center gap-5 relative z-10">
                <div class="w-14 h-14 bg-gradient-to-tr from-yellow-600 to-yellow-300 rounded-2xl flex items-center justify-center font-black text-2xl text-slate-900 shadow-xl shadow-yellow-500/20">DR</div>
                <div>
                    <h3 class="text-2xl font-black text-white tracking-tighter uppercase italic">Dr. Mohit Mandal <span class="text-yellow-500 underline">AIIMS DELHI</span></h3>
                    <p class="text-blue-400 text-xs font-black tracking-widest mt-1 uppercase italic">AIR 1 | NEET 2027 STRATEGY PORTAL</p>
                </div>
            </div>
        </div>

        <section class="glass rounded-3xl p-8 mb-8 overflow-hidden border-b-4 border-blue-600">
            <div class="flex justify-between items-end mb-2">
                <h2 class="text-xs font-bold uppercase text-blue-400 tracking-[0.4em] italic">AIIMS Manzil Meter</h2>
                <div class="text-right">
                    <span id="total-mcq-display" class="text-3xl font-black text-white italic tracking-tighter">0</span>
                    <span class="text-sm font-bold text-slate-500 uppercase"> / 25,000</span>
                </div>
            </div>
            <div class="road-path">
                <img src="mohit.png" id="mohit-walker" class="avatar-mohit" style="left: 0%" alt="Mohit">
                <img src="aiimsmohit.png" class="aiims-dest" alt="Goal">
            </div>
            <div class="flex justify-between mt-4 text-[10px] font-black uppercase tracking-widest">
                <span id="manzil-percent" class="text-yellow-500 bg-yellow-500/10 px-3 py-1 rounded-full">0% Journey Completed</span>
            </div>
        </section>
    </div>

    <nav class="max-w-6xl mx-auto p-4 flex justify-between items-center sticky top-4 z-50 glass rounded-2xl mb-8">
        <div class="flex items-center gap-4">
            <div>
                <h1 class="text-lg font-black tracking-tighter">NEET<span class="text-yellow-500">PRO</span></h1>
                <p id="nav-display-date" class="text-[9px] text-blue-500 font-bold uppercase tracking-widest"></p>
            </div>
        </div>
        <div class="flex bg-slate-900 rounded-full p-1 border border-slate-800">
            <button onclick="switchMode('normal')" id="btn-normal" class="px-5 py-2 rounded-full text-xs font-bold mode-transition">NEET PREP 🔵</button>
            <button onclick="switchMode('exam')" id="btn-exam" class="px-5 py-2 rounded-full text-xs font-bold mode-transition">Exam 🔴</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-4 space-y-6">
            <section class="glass rounded-3xl p-6">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-xs font-bold uppercase text-slate-400 tracking-widest italic">Task Master</h2>
                        <p id="viewing-date-label" class="text-[9px] text-yellow-500 font-bold uppercase mt-1">Viewing Today</p>
                    </div>
                    <span id="completion-stat" class="text-[10px] font-bold text-yellow-400 bg-yellow-500/10 px-2 py-1 rounded">0/0</span>
                </div>
                <div id="checklist" class="space-y-2"></div>
                <div class="mt-6 pt-4 border-t border-white/5">
                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                        <div id="progress-bar" class="bg-gradient-to-r from-blue-600 to-yellow-500 h-full transition-all duration-700" style="width: 0%"></div>
                    </div>
                </div>
            </section>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div class="glass rounded-3xl p-6">
                <div class="flex flex-wrap items-center justify-between mb-8 gap-4">
                    <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                        <button onclick="setSubject('physics')" id="tab-physics" class="px-5 py-2 rounded-lg text-xs font-bold transition-all">Physics</button>
                        <button onclick="setSubject('chemistry')" id="tab-chemistry" class="px-5 py-2 rounded-lg text-xs font-bold transition-all">Chemistry</button>
                        <button onclick="setSubject('biology')" id="tab-biology" class="px-5 py-2 rounded-lg text-xs font-bold transition-all">Biology</button>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="changeMonth(-1)" class="p-2 text-slate-500 hover:text-white">←</button>
                        <span id="month-display" class="text-xs font-black uppercase tracking-[0.2em] text-yellow-500"></span>
                        <button onclick="changeMonth(1)" class="p-2 text-slate-500 hover:text-white">→</button>
                    </div>
                </div>
                
                <div id="calendar-days" class="calendar-grid mb-8"></div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 p-4 bg-white/5 rounded-2xl border border-white/10">
                    <div>
                        <label class="text-[9px] uppercase font-bold text-slate-500 ml-1 italic">Active Date (Auto-Synced)</label>
                        <div id="active-date-box" class="bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-2.5 text-xs text-blue-400 font-bold mt-1"></div>
                    </div>
                    <div class="flex gap-2 items-end">
                        <div class="flex-1">
                            <label class="text-[9px] uppercase font-bold text-slate-500 ml-1 italic">MCQ Count</label>
                            <input type="number" id="log-count" placeholder="0" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-xs outline-none focus:border-yellow-500 mt-1">
                        </div>
                        <button onclick="saveDailyData()" class="bg-yellow-600 hover:bg-yellow-500 text-slate-900 font-black px-6 py-2.5 rounded-xl transition-all text-[10px] uppercase">Log</button>
                    </div>
                </div>
            </div>

            <div class="glass rounded-3xl p-6 h-80">
                <canvas id="analysisChart"></canvas>
            </div>
        </div>
    </main>

    <footer class="max-w-6xl mx-auto mt-12 mb-8 flex justify-center">
        <button onclick="deleteSelectedDayData()" class="text-[10px] text-slate-600 hover:text-red-500 border border-slate-800 hover:border-red-500/50 px-8 py-2 rounded-full transition-all font-bold tracking-widest uppercase">Clear Selected Day</button>
    </footer>

    <script>
        // Logic to get actual system date every time
        const getTodayKey = () => new Date().toISOString().split('T')[0];
        
        let REAL_TODAY = getTodayKey();
        const TOTAL_GOAL = 25000;
        let selectedDate = REAL_TODAY; 
        let currentMode = 'normal';
        let currentSubject = 'physics';
        let viewMonthDate = new Date(); 
        let myChart = null;

        let db = JSON.parse(localStorage.getItem('aiims_sync_final')) || { 
            physics: {}, chemistry: {}, biology: {}, taskHistory: {} 
        };

        const baseTasks = [
            { id: "b1", label: "Bio NCERT", time: "08:00 - 10:00" },
            { id: "b2", label: "Phy Formula", time: "10:00 - 12:00" },
            { id: "b3", label: "Chem Notes", time: "12:00 - 15:00" },
            { id: "b4", label: "Bio MCQ Sprint", time: "15:30 - 16:00" },
            { id: "b5", label: "Coaching Focus", time: "16:00 - 20:00" }
        ];

        const modeTasks = {
            normal: [
                { id: "n1", label: "Phy Revision", time: "10:30 - 11:00 PM" },
                { id: "n2", label: "Phy MCQ Session", time: "11:00 - 11:30 PM" },
                { id: "n3", label: "Chem Revision", time: "11:30 - 12:00 AM" },
                { id: "n4", label: "Chem MCQ Session", time: "12:00 - 12:30 AM" },
                { id: "n5", label: "11th Revision", time: "12:30 - 01:30 AM" }
            ],
            exam: [
                { id: "e1", label: "Phy Derivations & Qs", time: "10:30 - 11:30 PM" },
                { id: "e2", label: "Chem Qs Practice", time: "11:30 - 12:30 AM" }
            ]
        };

        function updateManzilMeter() {
            let total = 0;
            ['physics', 'chemistry', 'biology'].forEach(sub => {
                Object.values(db[sub]).forEach(count => { total += (parseInt(count) || 0); });
            });
            const percentage = Math.min((total / TOTAL_GOAL) * 100, 100);
            document.getElementById('total-mcq-display').innerText = total.toLocaleString();
            document.getElementById('manzil-percent').innerText = `${percentage.toFixed(1)}% Journey Completed`;
            document.getElementById('mohit-walker').style.left = `${(percentage / 100) * 92}%`;
        }

        function saveDailyData() {
            const val = parseInt(document.getElementById('log-count').value);
            if (isNaN(val) || val < 0) return;
            db[currentSubject][REAL_TODAY] = (db[currentSubject][REAL_TODAY] || 0) + val;
            localStorage.setItem('aiims_sync_final', JSON.stringify(db));
            renderCalendar(); updateManzilMeter();
            document.getElementById('log-count').value = '';
        }

        function switchMode(m) {
            currentMode = m;
            document.getElementById('btn-normal').className = `px-5 py-2 rounded-full text-xs font-bold mode-transition ${m==='normal' ? 'bg-blue-600 text-white' : 'text-slate-500'}`;
            document.getElementById('btn-exam').className = `px-5 py-2 rounded-full text-xs font-bold mode-transition ${m==='exam' ? 'bg-red-600 text-white' : 'text-slate-500'}`;
            renderChecklist();
        }

        function setSubject(s) {
            currentSubject = s;
            ['physics', 'chemistry', 'biology'].forEach(sub => {
                const el = document.getElementById(`tab-${sub}`);
                if(el) el.className = `px-5 py-2 rounded-lg text-xs font-bold transition-all ${sub === s ? 'bg-yellow-600 text-slate-900' : 'text-slate-500'}`;
            });
            renderCalendar();
        }

        function renderCalendar() {
            const y = viewMonthDate.getFullYear(), m = viewMonthDate.getMonth();
            const daysInMonth = new Date(y, m + 1, 0).getDate(), firstDay = new Date(y, m, 1).getDay();
            document.getElementById('month-display').innerText = viewMonthDate.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
            
            const container = document.getElementById('calendar-days');
            container.innerHTML = '';
            for (let i = 0; i < firstDay; i++) container.innerHTML += '<div></div>';
            
            let scores = [];
            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const count = db[currentSubject][dateKey] || 0;
                scores.push(count);
                
                let colorClass = 'bg-white/5 opacity-30 border-transparent';
                if (count >= 100) colorClass = 'bg-green-600 text-white opacity-100';
                else if (count >= 50) colorClass = 'bg-yellow-500 text-black opacity-100';
                else if (count > 0) colorClass = 'bg-blue-600 text-white opacity-100';

                let special = (dateKey === REAL_TODAY) ? 'today-sparkle' : (dateKey === selectedDate ? 'selected-date' : '');
                container.innerHTML += `<div onclick="selectDate('${dateKey}')" class="aspect-square flex items-center justify-center rounded-lg text-[9px] border cursor-pointer transition-all ${colorClass} ${special}">${d}</div>`;
            }
            updateGraph(scores);
        }

        function renderChecklist() {
            const tasks = [...baseTasks, ...modeTasks[currentMode]];
            const history = db.taskHistory[selectedDate] || {};
            document.getElementById('checklist').innerHTML = tasks.map(t => {
                const status = history[t.id];
                let cls = "border-white/5 bg-white/5 text-slate-500";
                let icon = "○";
                if (status === 'done') { cls = "border-green-500/40 bg-green-500/10 text-green-400"; icon = "✓"; }
                if (status === 'not-done') { cls = "border-red-500/40 bg-red-500/10 text-red-400"; icon = "✕"; }
                
                return `<div onclick="toggleTask('${t.id}', 'done')" ondblclick="toggleTask('${t.id}', 'not-done')" class="flex items-center justify-between p-3 rounded-xl border cursor-pointer select-none transition-all ${cls}">
                    <div class="flex flex-col"><span class="text-[10px] font-bold uppercase">${t.label}</span><span class="text-[8px] opacity-60 italic font-mono">${t.time}</span></div>
                    <span class="font-bold">${icon}</span>
                </div>`;
            }).join('');
            updateProgress();
        }

        function toggleTask(id, type) {
            if (!db.taskHistory[selectedDate]) db.taskHistory[selectedDate] = {};
            db.taskHistory[selectedDate][id] = (db.taskHistory[selectedDate][id] === type) ? null : type;
            localStorage.setItem('aiims_sync_final', JSON.stringify(db));
            renderChecklist();
        }

        function updateProgress() {
            const tasks = [...baseTasks, ...modeTasks[currentMode]];
            const history = db.taskHistory[selectedDate] || {};
            const done = tasks.filter(t => history[t.id] === 'done').length;
            document.getElementById('completion-stat').innerText = `${done}/${tasks.length}`;
            document.getElementById('progress-bar').style.width = `${(done / tasks.length) * 100}%`;
        }

        function selectDate(date) {
            selectedDate = date;
            document.getElementById('viewing-date-label').innerText = date === REAL_TODAY ? "Viewing Today" : `Date: ${date}`;
            renderCalendar(); renderChecklist();
        }

        function updateGraph(data) {
            const ctx = document.getElementById('analysisChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Array.from({length: data.length}, (_, i) => i + 1),
                    datasets: [{ data: data, backgroundColor: '#3b82f6', borderRadius: 4 }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function changeMonth(d) { viewMonthDate.setMonth(viewMonthDate.getMonth() + d); renderCalendar(); }
        
        // New specific delete logic
        function deleteSelectedDayData() {
            if(confirm(`Delete all data for ${selectedDate}?`)) {
                delete db.physics[selectedDate];
                delete db.chemistry[selectedDate];
                delete db.biology[selectedDate];
                delete db.taskHistory[selectedDate];
                localStorage.setItem('aiims_sync_final', JSON.stringify(db));
                location.reload();
            }
        }

        window.onload = () => {
            // Re-check real today on load (handles midnight transition)
            REAL_TODAY = getTodayKey();
            selectedDate = REAL_TODAY;
            document.getElementById('nav-display-date').innerText = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            document.getElementById('active-date-box').innerText = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            
            setSubject('physics');
            switchMode('normal');
            updateManzilMeter();
            renderCalendar();
            renderChecklist();
        };
    </script>
</body>
</html>
